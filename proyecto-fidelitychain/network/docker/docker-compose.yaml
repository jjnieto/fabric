version: '3.7'

volumes:
  orderer.fidelitychain.com:
  peer0.hotel.fidelitychain.com:
  peer0.cafeteria.fidelitychain.com:

networks:
  fidelity-net:
    name: fidelity-net

services:
  # ====================
  # ORDERER
  # ====================
  orderer.fidelitychain.com:
    container_name: orderer.fidelitychain.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    working_dir: /root
    command: orderer
    volumes:
      - ../../network/crypto-config/ordererOrganizations/fidelitychain.com/orderers/orderer.fidelitychain.com/msp:/var/hyperledger/orderer/msp
      - ../../network/crypto-config/ordererOrganizations/fidelitychain.com/orderers/orderer.fidelitychain.com/tls:/var/hyperledger/orderer/tls
      - orderer.fidelitychain.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
    networks:
      - fidelity-net

  # ====================
  # COUCHDB HOTEL
  # ====================
  couchdb.hotel:
    container_name: couchdb.hotel
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    networks:
      - fidelity-net

  # ====================
  # PEER0 HOTEL
  # ====================
  peer0.hotel.fidelitychain.com:
    container_name: peer0.hotel.fidelitychain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.hotel.fidelitychain.com
      - CORE_PEER_ADDRESS=peer0.hotel.fidelitychain.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.hotel.fidelitychain.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.hotel.fidelitychain.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.hotel.fidelitychain.com:7051
      - CORE_PEER_LOCALMSPID=HotelMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fidelity-net
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.hotel:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../../network/crypto-config/peerOrganizations/hotel.fidelitychain.com/peers/peer0.hotel.fidelitychain.com/msp:/etc/hyperledger/fabric/msp
      - ../../network/crypto-config/peerOrganizations/hotel.fidelitychain.com/peers/peer0.hotel.fidelitychain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.hotel.fidelitychain.com:/var/hyperledger/production
    ports:
      - 7051:7051
    depends_on:
      - couchdb.hotel
    networks:
      - fidelity-net

  # ====================
  # COUCHDB CAFETERIA
  # ====================
  couchdb.cafeteria:
    container_name: couchdb.cafeteria
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 7984:5984
    networks:
      - fidelity-net

  # ====================
  # PEER0 CAFETERIA
  # ====================
  peer0.cafeteria.fidelitychain.com:
    container_name: peer0.cafeteria.fidelitychain.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.cafeteria.fidelitychain.com
      - CORE_PEER_ADDRESS=peer0.cafeteria.fidelitychain.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.cafeteria.fidelitychain.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.cafeteria.fidelitychain.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.cafeteria.fidelitychain.com:9051
      - CORE_PEER_LOCALMSPID=CafeteriaMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fidelity-net
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.cafeteria:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /root
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../../network/crypto-config/peerOrganizations/cafeteria.fidelitychain.com/peers/peer0.cafeteria.fidelitychain.com/msp:/etc/hyperledger/fabric/msp
      - ../../network/crypto-config/peerOrganizations/cafeteria.fidelitychain.com/peers/peer0.cafeteria.fidelitychain.com/tls:/etc/hyperledger/fabric/tls
      - peer0.cafeteria.fidelitychain.com:/var/hyperledger/production
    ports:
      - 9051:9051
    depends_on:
      - couchdb.cafeteria
    networks:
      - fidelity-net

  # ====================
  # CLI
  # ====================
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.hotel.fidelitychain.com:7051
      - CORE_PEER_LOCALMSPID=HotelMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hotel.fidelitychain.com/peers/peer0.hotel.fidelitychain.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hotel.fidelitychain.com/peers/peer0.hotel.fidelitychain.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hotel.fidelitychain.com/peers/peer0.hotel.fidelitychain.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/peerOrganizations/hotel.fidelitychain.com/users/Admin@hotel.fidelitychain.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - ../../network/crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations
      - ../../network/channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    networks:
      - fidelity-net
    depends_on:
      - orderer.fidelitychain.com
      - peer0.hotel.fidelitychain.com
      - peer0.cafeteria.fidelitychain.com
